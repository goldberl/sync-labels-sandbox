name: Copy Issue Labels to PR

on:
  pull_request:
    types: [opened, edited, synchronize]

permissions:
  issues: write
  pull-requests: write

jobs:
  copy-labels:
    runs-on: ubuntu-latest
    steps:
      - name: Copy labels from issue
        uses: goldberl/sync-labels-action@main
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
