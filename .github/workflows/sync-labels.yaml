name: Label Sync

on:
  issues:
    types: [labeled, unlabeled]
  pull_request:
    types: [labeled, unlabeled, opened, edited, synchronize]

permissions:
  issues: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Run label sync
        uses: goldberl/label-sync-action@main
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}