name: Copy Issue Labels to PR

on:
  pull_request:
    types: [opened, edited, synchronize]

jobs:
  copy-labels:
    runs-on: ubuntu-latest
    permissions:
      issues: read
      pull-requests: write
    steps:
      - name: Copy labels from issue
        uses: michalvankodev/copy-issue-labels@v2.0.0
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}