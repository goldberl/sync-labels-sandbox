name: Bi-directional Label Sync

on:
  pull_request:
    types: [labeled, unlabeled, opened]
  issues:
    types: [labeled, unlabeled]

permissions:
  issues: write
  pull-requests: write
  contents: read

jobs:
  sync-labels:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Sync Logic
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            # 1. Identify the linked issue using common keywords
            ISSUE_NUM=$(echo "${{ github.event.pull_request.body }}" | grep -oP '(?i)(closes|closed|fixes|fixed|resolves|resolved)\s+#\K\d+' | head -1)
            
            if [ -n "$ISSUE_NUM" ]; then
              echo "Detected PR label change. Syncing to Issue #$ISSUE_NUM..."
              
              # 2. Capture the current PR labels as a comma-separated list
              LABELS=$(gh pr view ${{ github.event.pull_request.number }} --json labels --template '{{range .labels}}{{.name}},{{end}}' | sed 's/,$//')
              
              # 3. Set the Issue labels to match exactly (handles additions and removals)
              gh issue edit $ISSUE_NUM --label "$LABELS"
              echo "Issue #$ISSUE_NUM labels updated to: [$LABELS]"
            else
              echo "No linked issue found in the PR description. Skipping sync."
            fi

          elif [ "${{ github.event_name }}" == "issues" ]; then
            # 1. Find all PRs that claim to fix/close this issue
            PR_LIST=$(gh pr list --search "fixes #${{ github.event.issue.number }}" --json number --template '{{range .}}{{.number}} {{end}}')
            
            if [ -n "$PR_LIST" ]; then
              # 2. Capture current Issue labels
              LABELS=$(gh issue view ${{ github.event.issue.number }} --json labels --template '{{range .labels}}{{.name}},{{end}}' | sed 's/,$//')
              
              # 3. Update each linked PR to match the Issue
              for PR in $PR_LIST; do
                echo "Detected Issue label change. Syncing to PR #$PR..."
                gh pr edit $PR --label "$LABELS"
                echo "PR #$PR labels updated to: [$LABELS]"
              done
            else
              echo "No linked PRs found for this issue. Skipping sync."
            fi
          fi
